<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Checker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 id="heading" class="heading">Number Checker</h1>
        <p class="text">Enter a check number to its type.</p>
        <input type="number" id="userEnter" placeholder="Enter a number">
        <button id="button">Check</button>

        <span class="divide"></span>

        <div class="result">
            <p id="oddEvenResult"></p>
            <p id="signResult"></p>
        </div>
    </div>
       

    <script src="script.js"></script>
</body>

</html>
